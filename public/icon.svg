<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark void background -->
  <circle cx="16" cy="16" r="16" fill="#080808"/>

  <!-- Outer orbit ring (amber) -->
  <ellipse cx="16" cy="16" rx="14" ry="5" stroke="#EAB308" stroke-width="1.2" opacity="0.6"
    transform="rotate(-15, 16, 16)"/>

  <!-- Middle orbit ring (blue) -->
  <ellipse cx="16" cy="16" rx="11" ry="4" stroke="#2563EB" stroke-width="1" opacity="0.5"
    transform="rotate(20, 16, 16)"/>

  <!-- Inner orbit ring (violet) -->
  <ellipse cx="16" cy="16" rx="8" ry="3" stroke="#8B5CF6" stroke-width="0.8" opacity="0.4"
    transform="rotate(-35, 16, 16)"/>

  <!-- Central planet (amber-yellow glass sphere) -->
  <defs>
    <radialGradient id="planetGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="1"/>
      <stop offset="30%" stop-color="#EAB308" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#B45309" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#78350F" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Planet glow -->
  <circle cx="16" cy="16" r="6" fill="url(#glowGrad)"/>

  <!-- Planet body -->
  <circle cx="16" cy="16" r="3.5" fill="url(#planetGrad)"/>

  <!-- Specular highlight on planet -->
  <ellipse cx="14.5" cy="14.5" rx="1.2" ry="0.8" fill="white" opacity="0.3"
    transform="rotate(-20, 14.5, 14.5)"/>
</svg>
